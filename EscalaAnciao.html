<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão da Igreja 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .nav-btn.active { border-bottom: 3px solid #2563eb; color: #1e40af; }
        .month-btn.active { background-color: #1e40af !important; color: white !important; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .month-btn:not(.active) { color: #475569; }
        .month-btn:not(.active):hover { background-color: #f1f5f9; color: #1e293b; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .elder-card-blue { border-top: 5px solid #2563eb; background: linear-gradient(135deg, #eff6ff 0%, #ffffff 100%); }
        .elder-card-purple { border-top: 5px solid #9333ea; background: linear-gradient(135deg, #faf5ff 0%, #ffffff 100%); }
        .elder-card-emerald { border-top: 5px solid #059669; background: linear-gradient(135deg, #ecfdf5 0%, #ffffff 100%); }
        .elder-card-orange { border-top: 5px solid #ea580c; background: linear-gradient(135deg, #fff7ed 0%, #ffffff 100%); }
        .elder-card-indigo { border-top: 5px solid #4f46e5; background: linear-gradient(135deg, #eef2ff 0%, #ffffff 100%); }
        .elder-card-cyan { border-top: 5px solid #0891b2; background: linear-gradient(135deg, #ecfeff 0%, #ffffff 100%); }
        .elder-card-rose { border-top: 5px solid #e11d48; background: linear-gradient(135deg, #fff1f2 0%, #ffffff 100%); }
        .elder-card-amber { border-top: 5px solid #d97706; background: linear-gradient(135deg, #fffbeb 0%, #ffffff 100%); }
        .elder-card-teal { border-top: 5px solid #0d9488; background: linear-gradient(135deg, #f0fdfa 0%, #ffffff 100%); }
        .elder-card-pink { border-top: 5px solid #db2777; background: linear-gradient(135deg, #fdf2f8 0%, #ffffff 100%); }
        .elder-card-sky { border-top: 5px solid #0284c7; background: linear-gradient(135deg, #f0f9ff 0%, #ffffff 100%); }
        .elder-card-violet { border-top: 5px solid #7c3aed; background: linear-gradient(135deg, #f5f3ff 0%, #ffffff 100%); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 antialiased p-4 md:p-8">
    <div class="max-w-5xl mx-auto">
        <header class="mb-8 text-center md:text-left flex flex-col md:flex-row md:items-end justify-between gap-4 border-b border-slate-200 pb-6">
            <div>
                <h1 class="text-3xl font-bold text-slate-800 tracking-tight">Gestão da Igreja 2026</h1>
                <p class="text-slate-500 mt-1">Planeamento, Escalas e Liderança</p>
            </div>
            <nav class="flex gap-4 md:gap-6 overflow-x-auto no-scrollbar">
                <button onclick="setView('escala')" id="nav-escala" class="nav-btn active pb-2 font-semibold transition-all whitespace-nowrap">Escala de Cultos</button>
                <button onclick="setView('departamentos')" id="nav-departamentos" class="nav-btn pb-2 font-semibold transition-all whitespace-nowrap">Áreas (Anciãos)</button>
                <button onclick="setView('oficiais')" id="nav-oficiais" class="nav-btn pb-2 font-semibold transition-all whitespace-nowrap">Oficiais / Líderes</button>
            </nav>
        </header>

        <div id="section-escala">
            <div class="flex flex-col md:flex-row gap-4 mb-6">
                <div class="relative flex-grow">
                    <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400"></i>
                    <input type="text" id="searchInputEscala" placeholder="Pesquisar ancião ou orador..." class="w-full pl-11 pr-4 py-3 bg-white border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all outline-none shadow-sm">
                </div>
                <div class="flex items-center bg-white rounded-xl border border-slate-200 p-1 shadow-sm overflow-hidden" id="monthTabs">
                    <button onclick="changeMonth(0)" class="month-btn active px-4 py-2 text-sm font-bold rounded-lg transition-all">Abril</button>
                    <button onclick="changeMonth(1)" class="month-btn px-4 py-2 text-sm font-bold rounded-lg transition-all">Maio</button>
                    <button onclick="changeMonth(2)" class="month-btn px-4 py-2 text-sm font-bold rounded-lg transition-all">Junho</button>
                </div>
            </div>
            <div class="flex flex-wrap gap-4 mb-6 text-xs font-bold uppercase tracking-wider text-slate-500 px-2">
                <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded-full bg-blue-500"></div> Quarta-feira</div>
                <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded-full bg-emerald-500"></div> Sábado</div>
                <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded-full bg-rose-500"></div> Domingo</div>
            </div>
            <div id="scheduleGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
        </div>

        <div id="section-departamentos" class="hidden">
            <div class="mb-6 relative">
                <i data-lucide="filter" class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400"></i>
                <input type="text" id="searchInputDepto" placeholder="Filtrar ancião ou área de atuação..." class="w-full pl-11 pr-4 py-3 bg-white border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all outline-none shadow-sm">
            </div>
            <div id="deptoGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>

        <div id="section-oficiais" class="hidden">
            <div class="mb-6 relative">
                <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400"></i>
                <input type="text" id="searchInputOficiais" placeholder="Buscar líder ou departamento..." class="w-full pl-11 pr-4 py-3 bg-white border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all outline-none shadow-sm">
            </div>
            <div id="oficiaisGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
        </div>

        <footer class="mt-12 pt-8 border-t border-slate-200 text-center text-slate-400 text-sm">
            <p>© 2026 Gestão Eclesiástica • Secretaria da Igreja</p>
        </footer>
    </div>

            { date: "13/06", day: "SAB", names: ["José Luiz da Silva", "Anderson Gaspar Cipriano"], month: 2, orador: "Rebecca Nunes", info: "Culto Divino / Culto Jovem" },

            { date: "28/06", day: "DOM", names: ["Deivison Coelho Miguel", "José Luiz da Silva"], month: 2, orador: "Pr Robson Menezes", info: "Culto Noturno" }

        const eldersData = [
            { name: "Felipe Ferreira Coimbra", deptos: ["Vida Plena", "Sonoplastia/Transmissão", "Saúde"], color: "blue" },

            { name: "Anderson Gaspar Cipriano", deptos: ["Desbravadores", "Aventureiros"], color: "amber" },
            { name: "José Luiz da Silva", deptos: ["Min. Pessoal", "Min. Oração"], color: "teal" },
            { name: "Patrícia Miguel dos Santos", deptos: ["Min. da Mulher", "Min. da Família"], color: "pink" },
            { name: "Vitor Bruno do Nascimento", deptos: ["Min. Criança", "Possibilidades"], color: "sky" },
            { name: "Vladimir de Paula", deptos: ["Mordomia", "Escola Sabatina"], color: "violet" }
        ];

        const oficiaisData = [
            { depto: "Diácono Chefe", nome: "Luiz Albuquerque Silva", icon: "user-check" },
            { depto: "Diaconisa Chefe", nome: "Maria Raílda Silva de Oliveira", icon: "user-check" },
            { depto: "Secretaria", nome: "Célia Valentina Mattos da Silva", icon: "file-text" },
            { depto: "Gestor Financeiro", nome: "Sidnei Trindade Paixão", icon: "dollar-sign" },
            { depto: "Min. da Família", nome: "Claudia Villaça Oliveira e Leandro Ferreira", icon: "heart" },
            { depto: "Terceira Idade", nome: "Adriana Nascimento Frazão Pereira", icon: "users" },
            { depto: "Escola Sabatina", nome: "Flavia Estefhane de Almeida Coimbra", icon: "book-open" },
            { depto: "Ministério Pessoal", nome: "Robson Lourenço da Silva", icon: "cross" },
            { depto: "Missão Novo Tempo", nome: "Clara Regina Santiago dos Santos", icon: "tv" },

            { depto: "Ministério da Jovem", nome: "Daniel Magalhães Brandão", icon: "zap" },

        ];

        function getDayStyle(day) {
            switch (day) {
                case 'QUA': return 'bg-blue-100 text-blue-700 border-blue-200';
                case 'SAB': return 'bg-emerald-100 text-emerald-700 border-emerald-200';
                case 'DOM': return 'bg-rose-100 text-rose-700 border-rose-200';
                default: return 'bg-gray-100 text-gray-700 border-gray-200';
            }
        }

        function setView(view) {
            activeView = view;
            document.getElementById('section-escala').classList.toggle('hidden', view !== 'escala');
            document.getElementById('section-departamentos').classList.toggle('hidden', view !== 'departamentos');
            document.getElementById('section-oficiais').classList.toggle('hidden', view !== 'oficiais');
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.toggle('active', btn.id === `nav-${view}`));
            render();
        }

        function changeMonth(idx) {
            activeMonth = idx;
            document.querySelectorAll('.month-btn').forEach((btn, i) => btn.classList.toggle('active', i === idx));
            render();
        }

        function render() {
            if (activeView === 'escala') renderSchedule();
            else if (activeView === 'departamentos') renderDepartments();
            else renderOfficials();
            lucide.createIcons();
        }

        function renderSchedule() {
            const grid = document.getElementById('scheduleGrid');
            const filtered = scheduleData.filter(item => item.month === activeMonth && (!searchEscala || item.names.join(' ').toLowerCase().includes(searchEscala.toLowerCase()) || item.orador.toLowerCase().includes(searchEscala.toLowerCase()) || (item.info && item.info.toLowerCase().includes(searchEscala.toLowerCase()))));
            
            if (filtered.length === 0) {
                grid.innerHTML = `<div class="col-span-full py-20 text-center text-slate-400">Nenhum resultado para esta pesquisa.</div>`;
                return;
            }

            grid.innerHTML = filtered.map(item => `
                <div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden group hover:shadow-md transition-all">
                    <div class="flex items-center gap-3 p-4 bg-slate-50/50 border-b border-slate-100">
                        <div class="w-12 h-12 rounded-xl flex flex-col items-center justify-center border font-bold ${getDayStyle(item.day)} shadow-sm">
                            <span class="text-[10px] uppercase opacity-80 leading-none mb-1">${item.day}</span>
                            <span class="text-lg leading-none">${item.date.split('/')[0]}</span>
                        </div>
                        <div class="flex-grow">
                            <p class="font-bold text-slate-700 text-sm leading-tight">${item.info || 'Culto de Rotina'}</p>
                            <p class="text-[10px] text-slate-400 font-medium uppercase tracking-tighter">${months[activeMonth]} • 2026</p>
                        </div>
                    </div>
                    <div class="p-4 space-y-4">
                        <div>
                            <div class="flex items-center gap-2 mb-1 text-[10px] font-bold text-slate-400 uppercase tracking-widest">
                                <i data-lucide="mic-2" class="w-3 h-3"></i> Orador
                            </div>
                            <p class="text-sm font-semibold text-blue-700">${item.orador}</p>
                        </div>
                        <div>
                            <div class="flex items-center gap-2 mb-2 text-[10px] font-bold text-slate-400 uppercase tracking-widest">
                                <i data-lucide="users" class="w-3 h-3"></i> Anciãos
                            </div>
                            <div class="flex flex-wrap gap-1.5">
                                ${item.names.map(name => `
                                    <span class="px-2 py-1 bg-slate-50 text-slate-600 rounded-lg text-xs font-medium border border-slate-100 flex items-center gap-1">
                                        <div class="w-1.5 h-1.5 rounded-full bg-slate-300"></div>
                                        ${name}
                                    </span>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function renderDepartments() {
            const grid = document.getElementById('deptoGrid');
            const filtered = eldersData.filter(elder => !searchDepto || elder.name.toLowerCase().includes(searchDepto.toLowerCase()) || elder.deptos.join(' ').toLowerCase().includes(searchDepto.toLowerCase()));
            grid.innerHTML = filtered.map(elder => `<div class="rounded-2xl border border-slate-200 elder-card-${elder.color} p-5 shadow-sm"><h3 class="font-bold text-lg text-slate-800 mb-3">${elder.name}</h3><div class="flex flex-wrap gap-2">${elder.deptos.map(d => `<span class="px-3 py-1 bg-white border border-slate-100 rounded-lg text-xs font-bold text-slate-600 shadow-sm">${d}</span>`).join('')}</div></div>`).join('');
        }

        function renderOfficials() {
            const grid = document.getElementById('oficiaisGrid');
            const filtered = oficiaisData.filter(item => !searchOficiais || item.nome.toLowerCase().includes(searchOficiais.toLowerCase()) || item.depto.toLowerCase().includes(searchOficiais.toLowerCase()));
            grid.innerHTML = filtered.map(item => `<div class="bg-white p-4 rounded-2xl border border-slate-200 shadow-sm flex items-center gap-4"><div class="w-10 h-10 rounded-xl bg-blue-50 flex items-center justify-center flex-shrink-0">${item.icon === 'prayer-hands' ? prayerHandsSvg : `<i data-lucide="${item.icon}" class="w-5 h-5 text-blue-600"></i>`}</div><div><p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">${item.depto}</p><h4 class="font-bold text-slate-800 leading-tight">${item.nome}</h4></div></div>`).join('');
        }

        document.getElementById('searchInputEscala').oninput = (e) => { searchEscala = e.target.value; render(); };
        document.getElementById('searchInputDepto').oninput = (e) => { searchDepto = e.target.value; render(); };
        document.getElementById('searchInputOficiais').oninput = (e) => { searchOficiais = e.target.value; render(); };
        window.onload = render;
    </script>
</body>
</html>
